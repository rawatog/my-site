<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Basic Form with CSS</title>
  <style>
    :root{
      --bg:#f6f7f9;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --primary:#0d6efd;
      --primary-hover:#0b5ed7;
      --border:#dcdfe4;
      --shadow:0 4px 14px rgba(0,0,0,.08);
      --radius:12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef2f7, var(--bg));
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 48px 16px 24px;
    }
    header h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: .3px;
    }
    header p { margin: 0; color: var(--muted); }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    form {
      display: grid;
      gap: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
    }

    label {
      display: inline-block;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .hint { font-size: 13px; color: var(--muted); margin-top: 6px; }

    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      font-size: 15px;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea { min-height: 140px; resize: vertical; }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13,110,253,.15);
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .inline label {
      font-weight: 500;
      margin: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 12px 18px;
      font-size: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, transform .02s;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:active { transform: translateY(1px); }

    .note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    .required {
      color: #c62828;
      margin-left: 2px;
    }

    .status {
      display: none;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid;
      font-size: 14px;
    }
    .status.ok {
      display: block;
      background: #e7f7ed;
      color: #1e5f3a;
      border-color: #b7e1c9;
    }
    .status.err {
      display: block;
      background: #fdecea;
      color: #8a1f17;
      border-color: #f5c6c3;
    }
  </style>
</head>
<body>

  <header>
    <h1>Contact Form</h1>
    <p>Simple, accessible form with basic CSS styling.</p>
  </header>

  <main class="wrap">
    <section class="card" aria-labelledby="contact-title">
      <h2 id="contact-title" style="margin:0 0 12px;">Send a Message</h2>

      <form id="basicForm" novalidate>
        <div class="row">
          <div>
            <label for="name">Full Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="e.g., Manoj Rawat" required />
          </div>
          <div>
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="topic">Topic <span class="required">*</span></label>
            <select id="topic" name="topic" required>
              <option value="">Select a topic…</option>
              <option>General</option>
              <option>Support</option>
              <option>Partnership</option>
            </select>
          </div>
          <div>
            <label for="subject">Subject <span class="required">*</span></label>
            <input type="text" id="subject" name="subject" placeholder="How can I help?" required />
          </div>
        </div>

        <div>
          <label for="message">Message <span class="required">*</span></label>
          <textarea id="message" name="message" placeholder="Write your message…" required></textarea>
          <p class="hint">Keep it brief and clear (e.g., 2–5 sentences).</p>
        </div>

        <fieldset style="border:none; padding:0; margin:0;">
          <legend style="position:absolute;left:-9999px;top:auto;">Preferred contact method</legend>
          <div class="inline" role="group" aria-label="Preferred contact method">
            <strong style="font-size:14px;">Preferred contact:</strong>
            <label><input type="radio" name="contact_method" value="Email" checked /> Email</label>
            <label><input type="radio" name="contact_method" value="Phone" /> Phone</label>
          </div>
        </fieldset>

        <div class="inline">
          <label><input type="checkbox" id="consent" required /> I agree to be contacted <span class="required">*</span></label>
        </div>

        <button class="btn" type="submit">Send</button>
        <div id="status" class="status" aria-live="polite"></div>

        <p class="note">This demo validates in the browser and does not send data anywhere.</p>
      </form>
    </section>
  </main>

  <script>
    // Lightweight client-side validation + status message
    const form = document.getElementById('basicForm');
    const statusBox = document.getElementById('status');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      statusBox.className = 'status';
      statusBox.textContent = '';

      if (!form.checkValidity()) {
        statusBox.textContent = 'Please complete all required fields.';
        statusBox.classList.add('err');
        return;
      }

      // Simulate success
      statusBox.textContent = 'Your message is ready to be sent (demo only).';
      statusBox.classList.add('ok');

      // Reset after short delay (optional)
      setTimeout(() => form.reset(), 1200);
    });
  </script>
</body>
</html>
