    <title>My Basic Website</title>
    <style>

        }

            padding: 15px;
            text-align: center;

        }

            float: left;
            display: block;

            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;

</head>

    </header>

    <nav>
